name: Feature request
description: Suggest a new detector, dashboard widget, integration, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Before filing, please check the existing [issues](https://github.com/mal0ware/Threatscope/issues) to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the operator pain point or detection gap. "Make it better" is not specific enough.
      placeholder: "When I'm investigating a brute-force alert, I can't pivot to all events from the same source IP without manually crafting a query..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should this work from the operator's perspective? Sketches, wireframes, or sample API responses welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why this one wins.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - New detector (rule-based)
        - New detector (ML)
        - New parser / log source
        - Dashboard widget
        - Threat narrative / enrichment
        - Alert lifecycle (ack, suppress, escalate)
        - Search / FTS5
        - WebSocket / streaming
        - Authentication / authz
        - Tauri desktop integration
        - Performance / scaling
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: detection-evidence
    attributes:
      label: (Detector requests only) Empirical evidence
      description: |
        For new detectors, ideally include a sample log fixture (sanitized) demonstrating the attack pattern, and an estimate of the false-positive rate on baseline traffic.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots from other tools, links to research, MITRE ATT&CK technique IDs, etc.
